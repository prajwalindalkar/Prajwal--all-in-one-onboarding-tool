<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhonePe Merchant Onboarding Tool</title>
<style>
  :root {
    --purple:#5B2D8E; --purple-light:#f3eefb; --purple-mid:#d4b8f0;
    --green:#1a8a4a; --red:#c0392b; --gray:#f7f7f7; --border:#ddd; --text:#222; --muted:#666;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f0ebf8;color:var(--text);min-height:100vh;padding-bottom:80px}

  /* Top bar */
  #topbar{background:var(--purple);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  #topbar .logo{font-size:17px;font-weight:700;letter-spacing:.5px}
  #agent-display{font-size:12px;display:flex;align-items:center;gap:8px}
  #agent-display span{opacity:.85}
  #agent-display button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:white;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px}

  /* Progress bar — clickable */
  #progress-bar{background:white;padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;overflow-x:auto;font-size:11px;white-space:nowrap;position:sticky;top:46px;z-index:100}
  .step-indicator{display:flex;align-items:center;gap:4px;cursor:pointer;padding:2px 4px;border-radius:6px;transition:background .15s}
  .step-indicator:hover{background:var(--purple-light)}
  .step-indicator.not-clickable{cursor:default}
  .step-indicator.not-clickable:hover{background:transparent}
  .step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--border);background:white;color:var(--muted);flex-shrink:0;transition:all .2s}
  .step-dot.active{background:var(--purple);border-color:var(--purple);color:white}
  .step-dot.done{background:var(--green);border-color:var(--green);color:white}
  .step-label{color:var(--muted);font-size:11px}
  .step-label.active{color:var(--purple);font-weight:600}
  .step-arrow{color:var(--border);font-size:13px}

  /* Container */
  .container{max-width:640px;margin:0 auto;padding:14px}

  /* Card */
  .card{background:white;border-radius:12px;box-shadow:0 2px 12px rgba(91,45,142,.10);padding:20px;margin-bottom:14px}
  .card-title{font-size:17px;font-weight:700;color:var(--purple);margin-bottom:3px;display:flex;align-items:center;gap:7px}
  .card-subtitle{font-size:12px;color:var(--muted);margin-bottom:18px}
  .section-title{font-size:13px;font-weight:600;color:var(--purple);margin:18px 0 10px;padding-bottom:5px;border-bottom:2px solid var(--purple-mid)}

  /* Fields */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px}
  .field label .req{color:var(--red)}
  .field label .hint{font-weight:400;font-size:10px;color:var(--muted);display:block;margin-top:1px}
  .field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;transition:border .2s;background:white}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--purple)}
  .field .err-msg{color:var(--red);font-size:11px;margin-top:3px;display:none}
  .field.has-error .err-msg{display:block}
  .field.has-error input,.field.has-error select,.field.has-error textarea{border-color:var(--red)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:480px){.field-row{grid-template-columns:1fr}}

  /* Radio / checkbox pills */
  .radio-group,.check-group{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px}
  .radio-group label,.check-group label{display:flex;align-items:center;gap:5px;padding:7px 13px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:400;transition:all .15s;margin:0}
  .radio-group input[type=radio],.check-group input[type=checkbox]{display:none}
  .radio-group label:has(input:checked),.check-group label:has(input:checked){background:var(--purple-light);border-color:var(--purple);color:var(--purple);font-weight:600}

  /* Merchant type cards */
  .merchant-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  @media(max-width:480px){.merchant-cards{grid-template-columns:1fr}}
  .merchant-card{border:2px solid var(--border);border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s}
  .merchant-card:hover{border-color:var(--purple-mid);background:var(--purple-light)}
  .merchant-card.selected{border-color:var(--purple);background:var(--purple-light)}
  .merchant-card .icon{font-size:26px;margin-bottom:6px}
  .merchant-card .name{font-size:12px;font-weight:700;color:var(--purple)}
  .merchant-card .docs{font-size:10px;color:var(--muted);margin-top:3px}

  /* Partner cards */
  .partner-card{border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--gray)}
  .partner-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .partner-card-title{font-weight:700;color:var(--purple);font-size:13px}
  .btn-remove{background:none;border:none;color:var(--red);font-size:19px;cursor:pointer;padding:0 4px}
  .share-total{padding:9px 13px;border-radius:8px;font-size:12px;font-weight:600;margin-top:4px}
  .share-total.ok{background:#e8f8f0;color:var(--green)}
  .share-total.bad{background:#fdf0ef;color:var(--red)}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
  .btn-primary{background:var(--purple);color:white}
  .btn-primary:hover{background:#4a2270}
  .btn-secondary{background:white;color:var(--purple);border:2px solid var(--purple)}
  .btn-secondary:hover{background:var(--purple-light)}
  .btn-success{background:var(--green);color:white}
  .btn-success:hover{background:#146a38}
  .btn-danger{background:white;color:var(--red);border:2px solid var(--red)}
  .btn-add{display:flex;align-items:center;gap:6px;padding:9px 14px;border:2px dashed var(--purple-mid);border-radius:8px;background:var(--purple-light);color:var(--purple);font-size:13px;font-weight:600;cursor:pointer;width:100%;justify-content:center}
  .btn-add:hover{border-color:var(--purple)}
  .nav-buttons{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px;flex-wrap:wrap}

  /* Info / warning boxes */
  .info-box{background:var(--purple-light);border:1px solid var(--purple-mid);border-radius:8px;padding:10px 13px;font-size:12px;color:#4a2270;margin-bottom:12px}
  .info-box strong{display:block;margin-bottom:3px}
  .warn-box{background:#fff8e1;border:1px solid #f0c040;border-radius:8px;padding:10px 13px;font-size:12px;color:#7a5500;margin-bottom:12px}
  .err-box{background:#fdf0ef;border:1px solid #f4a49e;border-radius:8px;padding:10px 13px;font-size:12px;color:var(--red);margin-bottom:12px}

  /* Auth signatory selector */
  .auth-option{display:flex;align-items:center;gap:9px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13px;transition:all .15s}
  .auth-option input[type=radio]{display:none}
  .auth-option:has(input:checked){background:var(--purple-light);border-color:var(--purple);color:var(--purple);font-weight:600}
  .auth-badge{display:inline-block;background:var(--purple);color:white;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:6px}

  /* Present partner checkboxes */
  .present-partner-item{display:flex;align-items:center;gap:9px;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13px;transition:all .15s}
  .present-partner-item input[type=checkbox]{display:none}
  .present-partner-item:has(input:checked){background:var(--purple-light);border-color:var(--purple)}
  .present-partner-item .pname{font-weight:600}
  .present-partner-item .pshare{font-size:11px;color:var(--muted);margin-left:auto}

  /* Review */
  .review-group{margin-bottom:16px}
  .review-group-title{font-size:13px;font-weight:700;color:var(--purple);background:var(--purple-light);padding:6px 12px;border-radius:6px;margin-bottom:8px}
  .review-row{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
  .review-row .rl{color:var(--muted);width:42%;flex-shrink:0;font-size:12px}
  .review-row .rv{font-weight:600;color:var(--text);word-break:break-word}
  .review-tag{display:inline-block;background:#eaf4ee;color:var(--green);border:1px solid #b6ddc4;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:5px}
  .download-card{border:2px solid var(--green);border-radius:10px;padding:14px;background:#f0fbf5;margin-bottom:10px}
  .download-card .doc-name{font-weight:700;color:var(--green);font-size:14px;margin-bottom:4px}
  .download-card .doc-desc{font-size:11px;color:var(--muted);margin-bottom:10px}

  /* Toggle */
  .has-toggle{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .toggle-switch{position:relative;display:inline-block;width:38px;height:21px}
  .toggle-switch input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:21px;transition:.3s}
  .toggle-slider:before{position:absolute;content:"";height:15px;width:15px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
  input:checked+.toggle-slider{background:var(--purple)}
  input:checked+.toggle-slider:before{transform:translateX(17px)}

  /* Aadhaar */
  .aadhaar-input{display:flex;align-items:center;gap:6px}
  .aadhaar-prefix{background:#eee;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:13px;color:var(--muted);white-space:nowrap}

  /* Loading spinner */
  .loading{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .spinner{width:16px;height:16px;border:2px solid var(--purple-mid);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Disclaimer footer */
  .disclaimer{background:#f9f9f9;border-top:1px solid var(--border);padding:10px 16px;font-size:10px;color:#999;text-align:center;position:fixed;bottom:0;left:0;right:0;z-index:50}

  .hidden{display:none!important}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">📱 PhonePe Onboarding Tool</div>
  <div id="agent-display" class="hidden">
    <span id="agent-name-display"></span>
    <button onclick="editAgent()">✏️ Edit</button>
  </div>
</div>

<div id="progress-bar"></div>
<div class="container" id="app-container"></div>

<div class="disclaimer">
  ⚠️ Disclaimer: PhonePe is not responsible for documents generated using this tool. User must review, verify, and use documents at their own discretion.
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
let agent = null;
let merchantType = null;
let currentStep = 0;

// Per-type data stored independently
let allFormData = { proprietor:{}, partnership:{}, company:{} };

const SHEETS_URL = '';

// ─── localStorage ─────────────────────────────────────────────────────────
function saveAgent(a){ localStorage.setItem('pe_agent_v2', JSON.stringify(a)); agent=a; }
function loadAgent(){ try{ return JSON.parse(localStorage.getItem('pe_agent_v2')); }catch{ return null; } }
function saveAll(){ localStorage.setItem('pe_all_v2', JSON.stringify({ merchantType, allFormData })); }
function loadAll(){ try{ return JSON.parse(localStorage.getItem('pe_all_v2')); }catch{ return null; } }
function clearAll(){ localStorage.removeItem('pe_all_v2'); allFormData={proprietor:{},partnership:{},company:{}}; merchantType=null; }

function fd(){ return allFormData[merchantType] || {}; }
function setfd(key, val){ if(!allFormData[merchantType]) allFormData[merchantType]={}; allFormData[merchantType][key]=val; saveAll(); }

// ─── Init ─────────────────────────────────────────────────────────────────
function init(){
  agent = loadAgent();
  const saved = loadAll();
  if(saved){
    allFormData = saved.allFormData || { proprietor:{}, partnership:{}, company:{} };
    merchantType = saved.merchantType || null;
  }
  if(agent){
    showAgentBar();
    renderStep(merchantType ? 1 : 0);
  } else {
    renderStep(-1);
  }
}

function showAgentBar(){
  document.getElementById('agent-display').classList.remove('hidden');
  document.getElementById('agent-name-display').textContent = `👤 ${agent.name} | ${agent.cm}`;
}
function editAgent(){ if(!confirm('Edit agent info?')) return; renderStep(-1); }

// ─── Steps config ──────────────────────────────────────────────────────────
function getSteps(){
  if(merchantType==='proprietor') return [
    {id:'type',label:'Merchant Type'},
    {id:'business',label:'Business Info'},
    {id:'as',label:'Signatory'},
    {id:'review',label:'Review & Download'}
  ];
  if(merchantType==='partnership') return [
    {id:'type',label:'Merchant Type'},
    {id:'business',label:'Firm Info'},
    {id:'partners',label:'Partners'},
    {id:'resolution',label:'Resolution'},
    {id:'bo',label:'BO Declaration'},
    {id:'letterhead',label:'Letterhead'},
    {id:'review',label:'Review & Download'}
  ];
  if(merchantType==='company') return [
    {id:'type',label:'Merchant Type'},
    {id:'business',label:'Company Info'},
    {id:'directors',label:'Directors / BO'},
    {id:'company-bo',label:'BO Declaration'},
    {id:'letterhead',label:'Letterhead'},
    {id:'review',label:'Review & Download'}
  ];
  return [{id:'type',label:'Merchant Type'}];
}

function renderProgress(){
  const bar = document.getElementById('progress-bar');
  if(currentStep < 0){ bar.innerHTML=''; return; }
  const steps = getSteps();
  bar.innerHTML = steps.map((s,i)=>{
    const cls = i < currentStep ? 'done' : i===currentStep ? 'active' : '';
    const lbl = i < currentStep ? '✓' : i+1;
    // Clickable only if step is done (already visited)
    const clickable = i < currentStep;
    return `
      ${i>0?'<span class="step-arrow">›</span>':''}
      <div class="step-indicator ${clickable?'':'not-clickable'}" ${clickable?`onclick="jumpToStep(${i})" title="Go to ${s.label}"`:''}> 
        <div class="step-dot ${cls}">${lbl}</div>
        <span class="step-label ${i===currentStep?'active':''}">${s.label}</span>
      </div>`;
  }).join('');
}

function jumpToStep(idx){
  // Allow jumping back to any completed step
  if(idx < currentStep){ renderStep(idx); }
}

function renderStep(step){
  currentStep = step;
  renderProgress();
  const cont = document.getElementById('app-container');
  if(step===-1){ cont.innerHTML=renderAgentSetup(); return; }
  if(step===0){ cont.innerHTML=renderMerchantType(); return; }
  const steps = getSteps();
  const sid = steps[step]?.id;
  if(!sid){ cont.innerHTML=''; return; }
  const renders = {
    business: renderBusinessInfo,
    partners: renderPartners,
    resolution: renderResolution,
    bo: renderBODeclaration,
    directors: renderDirectors,
    'company-bo': renderCompanyBO,
    letterhead: renderLetterhead,
    as: renderASDetails,
    review: renderReview
  };
  cont.innerHTML = (renders[sid]||(() => ''))();
  if(sid==='partners') bindPartners();
  if(sid==='resolution') bindResolution();
  if(sid==='directors') bindDirectors();
  if(sid==='company-bo') bindCompanyBO();
  // Scroll to top
  window.scrollTo(0,0);
}

// ─── Validation helpers ───────────────────────────────────────────────────
function validatePAN(v){ return /^[A-Z]{5}[0-9]{4}[A-Z]$/.test((v||'').toUpperCase()); }
function validatePhone(v){ return /^[6-9]\d{9}$/.test(v); }
function validateEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function fieldErr(id,msg){
  const el=document.getElementById(id); if(!el) return;
  const w=el.closest('.field'); if(w){ w.classList.add('has-error'); const em=w.querySelector('.err-msg'); if(em) em.textContent=msg; }
  el.focus();
}
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function selVal(id){ const e=document.getElementById(id); return e?e.value:''; }
function radioVal(name){ const e=document.querySelector(`input[name="${name}"]:checked`); return e?e.value:''; }
function checkboxVal(id){ const e=document.getElementById(id); return e?e.checked:false; }

// Display date DD/MM/YYYY from input value YYYY-MM-DD
function dispDate(v){ if(!v) return ''; const p=v.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:v; }

// ─── Step -1: Agent Setup ─────────────────────────────────────────────────
function renderAgentSetup(){
  const a=agent||{};
  return `
  <div class="card">
    <div class="card-title">👤 Agent Setup</div>
    <div class="card-subtitle">Saved permanently — you won't be asked again</div>
    <div class="info-box"><strong>One-time setup</strong>Your name appears at the top of every session after this.</div>
    <div class="field"><label>Your Name <span class="req">*</span></label>
      <input id="ag-name" value="${a.name||''}" placeholder="e.g. Prajwal Indalkar"/><div class="err-msg">Required</div></div>
    <div class="field"><label>Your Phone <span class="req">*</span></label>
      <input id="ag-phone" maxlength="10" value="${a.phone||''}" placeholder="10-digit mobile"/><div class="err-msg">Enter valid 10-digit number</div></div>
    <div class="field"><label>CM / Manager Name <span class="req">*</span></label>
      <input id="ag-cm" value="${a.cm||''}" placeholder="e.g. Saurav Raj"/><div class="err-msg">Required</div></div>
    <div class="field"><label>State <span class="req">*</span></label>
      <input id="ag-state" value="${a.state||''}" placeholder="e.g. Chhattisgarh"/><div class="err-msg">Required</div></div>
    <div class="field"><label>Google Sheets URL (optional)<span class="hint">For usage logging</span></label>
      <input id="ag-sheets" value="${a.sheetsUrl||''}" placeholder="https://script.google.com/..."/></div>
    <div class="nav-buttons"><div></div>
      <button class="btn btn-primary" onclick="saveAgentStep()">Save & Continue →</button>
    </div>
  </div>`;
}
function saveAgentStep(){
  let ok=true;
  if(!val('ag-name')){ fieldErr('ag-name','Required'); ok=false; }
  if(!validatePhone(val('ag-phone'))){ fieldErr('ag-phone','Enter valid 10-digit number'); ok=false; }
  if(!val('ag-cm')){ fieldErr('ag-cm','Required'); ok=false; }
  if(!val('ag-state')){ fieldErr('ag-state','Required'); ok=false; }
  if(!ok) return;
  saveAgent({name:val('ag-name'),phone:val('ag-phone'),cm:val('ag-cm'),state:val('ag-state'),sheetsUrl:val('ag-sheets')});
  showAgentBar(); renderStep(0);
}

// ─── Step 0: Merchant Type ─────────────────────────────────────────────────
function renderMerchantType(){
  return `
  <div class="card">
    <div class="card-title">🏪 Select Merchant Type</div>
    <div class="card-subtitle">Data for each type is saved independently — switching types won't erase other data</div>
    <div class="merchant-cards">
      <div class="merchant-card ${merchantType==='proprietor'?'selected':''}" onclick="selectType('proprietor',this)">
        <div class="icon">👤</div><div class="name">Sole Proprietor</div><div class="docs">MDF only</div>
      </div>
      <div class="merchant-card ${merchantType==='partnership'?'selected':''}" onclick="selectType('partnership',this)">
        <div class="icon">🤝</div><div class="name">Partnership Firm</div><div class="docs">Resolution + BO Declaration</div>
      </div>
      <div class="merchant-card ${merchantType==='company'?'selected':''}" onclick="selectType('company',this)">
        <div class="icon">🏢</div><div class="name">Private Limited</div><div class="docs">Company BO Declaration</div>
      </div>
    </div>
    <div id="type-err" class="err-box hidden" style="margin-top:10px">Please select a merchant type</div>
    <div class="nav-buttons">
      <button class="btn btn-danger" onclick="confirmClearAll()">🗑 Clear All Data</button>
      <button class="btn btn-primary" onclick="confirmType()">Next →</button>
    </div>
  </div>`;
}
function selectType(t, el){
  merchantType = t;
  document.querySelectorAll('.merchant-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  saveAll();
}
function confirmType(){
  if(!merchantType){ document.getElementById('type-err').classList.remove('hidden'); return; }
  currentStep=1; renderStep(1);
}
function confirmClearAll(){
  if(!confirm('Clear ALL saved data for all merchant types? This cannot be undone.')) return;
  clearAll(); merchantType=null; renderStep(0);
}

// ─── Business Info ─────────────────────────────────────────────────────────
function renderBusinessInfo(){
  const b=fd().business||{};
  const isP = merchantType==='partnership';
  const isC = merchantType==='company';
  const isProp = merchantType==='proprietor';
  return `
  <div class="card">
    <div class="card-title">${isP?'🤝 Firm Info':isC?'🏢 Company Info':'👤 Business Info'}</div>
    <div class="card-subtitle">As it appears on the Business PAN card</div>
    <div class="field"><label>${isP?'Partnership Firm Name':'Business / Company Name'} <span class="req">*</span>
      <span class="hint">Must match name on Business PAN Card</span></label>
      <input id="b-name" value="${b.name||''}" placeholder="${isP?'e.g. XYZ Hypermart':'e.g. ABC Enterprises'}"/>
      <div class="err-msg">Required – must match PAN</div></div>
    <div class="field"><label>Registered Office Address <span class="req">*</span>
      <span class="hint">Full address including PIN code</span></label>
      <textarea id="b-regaddr" rows="2" placeholder="e.g. Shop No 2, Karve Layout, Bangalore, Karnataka - 400019">${b.registeredAddress||''}</textarea>
      <div class="err-msg">Required</div></div>
    <div class="field"><label>Principal Place of Operation</label>
      <div class="radio-group">
        <label><input type="radio" name="principal-same" value="true" ${b.principalSame===false||b.principalSame==='false'?'':'checked'} onchange="togglePrincipal()"> Same as Registered Address</label>
        <label><input type="radio" name="principal-same" value="false" ${b.principalSame===false||b.principalSame==='false'?'checked':''} onchange="togglePrincipal()"> Different Address</label>
      </div>
    </div>

function togglePrincipal(){
  const same = radioVal('principal-same') !== 'false';
  document.getElementById('principal-addr-field').classList.toggle('hidden', same);
}
function onFirmTypeChange(){
  const v = selVal('b-firmtype');
  document.getElementById('np-registered-section').style.display = v==='Registered' ? '' : 'none';
  document.getElementById('np-unregistered-section').style.display = v==='Unregistered' ? '' : 'none';
}
function saveBusinessInfo(){
  let ok=true;
  if(!val('b-name')){ fieldErr('b-name','Required'); ok=false; }
  if(!val('b-regaddr')){ fieldErr('b-regaddr','Required'); ok=false; }
  if(!val('b-city')){ fieldErr('b-city','Required'); ok=false; }
  const principalSame = radioVal('principal-same') !== 'false';
  if(!principalSame && !val('b-principaladdr')){ fieldErr('b-principaladdr','Required'); ok=false; }
  if(merchantType==='partnership'){
    if(!val('b-deeddate')){ fieldErr('b-deeddate','Required'); ok=false; }
    const ft = selVal('b-firmtype');
    if(!ft){ fieldErr('b-firmtype','Required'); ok=false; }
    else {
      if(ft==='Registered' && !radioVal('np10')){ document.getElementById('np10-err').style.display='block'; ok=false; }
      if(ft==='Unregistered' && !radioVal('np15')){ document.getElementById('np15-err').style.display='block'; ok=false; }
    }
  }
  if(merchantType==='proprietor' && !selVal('b-entitytype')){ fieldErr('b-entitytype','Required'); ok=false; }
  if(!ok) return;
  setfd('business', {
    name:val('b-name'), registeredAddress:val('b-regaddr'), city:val('b-city'),
    principalSame, principalAddress: principalSame ? val('b-regaddr') : val('b-principaladdr'),
    deedDate: val('b-deeddate')||undefined,
    firmType: selVal('b-firmtype')||undefined,
    naturalPersons10: radioVal('np10')||undefined,
    naturalPersons15: radioVal('np15')||undefined,
    pep: radioVal('pep')||'NO',
    entityType: selVal('b-entitytype')||(merchantType==='company'?'Company':undefined),
    nature: radioVal('nature')||'NA',
  });
  renderStep(currentStep+1);
}

let partnerList = [];
function renderPartners(){

  return `
  <div class="card">
    <div class="card-title">👥 Partners</div>

function newPartner(){ return {id:Date.now()+Math.random(),name:'',address:'',designation:'Partner',dob:'',pan:'',ovdType:'Aadhaar',aadhaarLast4:'',ovdNumber:'',nationality:'Indian',share:'',isAuth:false}; }
function bindPartners(){ renderPartnerCards(); updateShareTotal(); }
function renderPartnerCards(){
  const cont=document.getElementById('partners-container'); if(!cont) return;
  cont.innerHTML = partnerList.map((pp,i)=>`
    <div class="partner-card">
      <div class="partner-card-header">
        <div class="partner-card-title">Partner ${i+1} ${pp.isAuth?'<span class="auth-badge">Authorised Signatory</span>':''}</div>
        ${partnerList.length>1?`<button class="btn-remove" onclick="removePartner('${pp.id}')">✕</button>`:''}
      </div>
      <div class="field"><label>Full Name <span class="req">*</span><span class="hint">As on PAN card</span></label>
        <input id="pn-${pp.id}" value="${pp.name}" placeholder="Full name" oninput="updatePartnerField('${pp.id}','name',this.value)"/>
        <div class="err-msg">Required</div></div>
      <div class="field"><label>Residential Address & PIN <span class="req">*</span></label>
        <textarea id="pa-${pp.id}" rows="2" placeholder="Address with PIN code" oninput="updatePartnerField('${pp.id}','address',this.value)">${pp.address}</textarea>
        <div class="err-msg">Required</div></div>
      <div class="field-row">
        <div class="field"><label>Designation</label>
          <input id="pd-${pp.id}" value="${pp.designation||'Partner'}" oninput="updatePartnerField('${pp.id}','designation',this.value)"/></div>
        <div class="field"><label>Date of Birth <span class="req">*</span></label>
          <input type="date" id="pdob-${pp.id}" value="${pp.dob}" onchange="updatePartnerField('${pp.id}','dob',this.value)"/>
          <div class="err-msg">Required</div></div>
      </div>
      <div class="field"><label>PAN Number <span class="req">*</span></label>
        <input id="ppan-${pp.id}" maxlength="10" style="text-transform:uppercase" value="${pp.pan}" placeholder="ABCDE1234F"
          oninput="this.value=this.value.toUpperCase();updatePartnerField('${pp.id}','pan',this.value)"/>
        <div class="err-msg">Invalid PAN format</div></div>
      <div class="field"><label>Address Proof (OVD) <span class="req">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="povd-${pp.id}" value="Aadhaar" ${pp.ovdType==='Aadhaar'?'checked':''} onchange="setOVDType('${pp.id}','Aadhaar')"> Aadhaar</label>
          <label><input type="radio" name="povd-${pp.id}" value="Driving License" ${pp.ovdType==='Driving License'?'checked':''} onchange="setOVDType('${pp.id}','Driving License')"> Driving License</label>
          <label><input type="radio" name="povd-${pp.id}" value="Voter ID" ${pp.ovdType==='Voter ID'?'checked':''} onchange="setOVDType('${pp.id}','Voter ID')"> Voter ID</label>
        </div></div>
      <div id="aadhaar-field-${pp.id}" style="${pp.ovdType==='Aadhaar'?'':'display:none'}">
        <div class="field"><label>Aadhaar (Last 4 digits) <span class="req">*</span></label>
          <div class="aadhaar-input">
            <span class="aadhaar-prefix">XXXX XXXX</span>
            <input id="paadh-${pp.id}" maxlength="4" placeholder="1234" value="${pp.aadhaarLast4}"
              oninput="updatePartnerField('${pp.id}','aadhaarLast4',this.value.replace(/\D/g,''))" style="flex:1"/>
          </div><div class="err-msg">Enter 4 digits</div></div>
      </div>
      <div id="ovd-num-field-${pp.id}" style="${pp.ovdType!=='Aadhaar'?'':'display:none'}">
        <div class="field"><label>OVD Number <span class="req">*</span></label>
          <input id="povdnum-${pp.id}" value="${pp.ovdNumber||''}" placeholder="Document number"
            oninput="updatePartnerField('${pp.id}','ovdNumber',this.value)"/>
          <div class="err-msg">Required</div></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Nationality</label>
          <input id="pnat-${pp.id}" value="${pp.nationality||'Indian'}" oninput="updatePartnerField('${pp.id}','nationality',this.value)"/></div>
        <div class="field"><label>Ownership % <span class="req">*</span>
          <span class="hint">Must total 100% across all partners</span></label>
          <input id="pshare-${pp.id}" type="number" min="0" max="100" step="0.01" placeholder="e.g. 33.33" value="${pp.share}"
            oninput="updatePartnerField('${pp.id}','share',this.value);updateShareTotal()"/>
          <div class="err-msg">Required</div></div>
      </div>
      <div class="field"><label>Set as Authorised Signatory?</label>
        <label class="auth-option">
          <input type="radio" name="auth-sig" value="${pp.id}" ${pp.isAuth?'checked':''} onchange="setAuth('${pp.id}')">
          ✓ Yes, this partner is the Authorised Signatory
        </label>
      </div>
    </div>`).join('');
  updateShareTotal();
}
function updatePartnerField(id,field,value){ const pp=partnerList.find(p=>String(p.id)===String(id)); if(pp) pp[field]=value; }
function setOVDType(id,type){
  updatePartnerField(id,'ovdType',type);
  document.getElementById(`aadhaar-field-${id}`).style.display = type==='Aadhaar'?'':'none';
  document.getElementById(`ovd-num-field-${id}`).style.display = type!=='Aadhaar'?'':'none';
}
function setAuth(id){ partnerList.forEach(pp=>{pp.isAuth=String(pp.id)===String(id);}); renderPartnerCards(); }
function addPartner(){ partnerList.push(newPartner()); renderPartnerCards(); }
function removePartner(id){ if(partnerList.length<=1) return; partnerList=partnerList.filter(p=>String(p.id)!==String(id)); renderPartnerCards(); }
function updateShareTotal(){
  const total=partnerList.reduce((s,p)=>s+(parseFloat(p.share)||0),0);
  const el=document.getElementById('share-total'); if(!el) return;
  const ok=Math.abs(total-100)<0.01;
  el.className='share-total '+(ok?'ok':'bad');
  el.textContent=`Total: ${total.toFixed(2)}% ${ok?'✓ Perfect!':'(must be exactly 100%)'}`;
}
function savePartners(){
  // Sync from DOM
  partnerList.forEach(pp=>{
    const n=document.getElementById(`pn-${pp.id}`); if(n) pp.name=n.value.trim();
    const a=document.getElementById(`pa-${pp.id}`); if(a) pp.address=a.value.trim();
    const sh=document.getElementById(`pshare-${pp.id}`); if(sh) pp.share=sh.value;
  });
  let ok=true;
  for(const pp of partnerList){
    if(!pp.name){ alert(`Partner name missing for Partner ${partnerList.indexOf(pp)+1}`); ok=false; break; }
    if(!pp.address){ alert(`Address missing for ${pp.name}`); ok=false; break; }
    if(!pp.dob){ alert(`DOB missing for ${pp.name}`); ok=false; break; }
    if(!validatePAN(pp.pan)){ alert(`Invalid PAN for ${pp.name||'a partner'} (format: ABCDE1234F)`); ok=false; break; }
    if(pp.ovdType==='Aadhaar'&&pp.aadhaarLast4.length!==4){ alert(`Enter 4-digit Aadhaar suffix for ${pp.name}`); ok=false; break; }
    if(pp.ovdType!=='Aadhaar'&&!pp.ovdNumber){ alert(`OVD number missing for ${pp.name}`); ok=false; break; }
    if(!pp.share){ alert(`Ownership % missing for ${pp.name}`); ok=false; break; }
  }
  if(!ok) return;
  const total=partnerList.reduce((s,p)=>s+(parseFloat(p.share)||0),0);
  if(Math.abs(total-100)>0.01){ alert(`Total ownership is ${total.toFixed(2)}%. Must be exactly 100%.`); return; }
  if(!partnerList.some(p=>p.isAuth)){ alert('Please select one partner as the Authorised Signatory.'); return; }
  setfd('partners', partnerList);
  renderStep(currentStep+1);
}

// ─── Resolution ────────────────────────────────────────────────────────────
function renderResolution(){
  const res=fd().resolution||{};
  const partners=fd().partners||[];
  const presentIds=(res.presentIds||[]).map(String);
  return `
  <div class="card">
    <div class="card-title">📝 Partner Resolution</div>
    <div class="card-subtitle">Meeting details for the Resolution document</div>
    <div class="info-box"><strong>📋 Rules</strong>
      • Partners present must have combined share > 50%<br>
      • Authorised Signatory should be present</div>
    <div class="field-row">
      <div class="field"><label>Meeting Date <span class="req">*</span></label>
        <input type="date" id="res-date" value="${res.date||''}"/>
        <div class="err-msg">Required</div></div>
      <div class="field"><label>Meeting Time <span class="req">*</span></label>
        <input id="res-time" placeholder="e.g. 9:30 AM" value="${res.time||''}"/>
        <div class="err-msg">Required</div></div>
    </div>
    <div class="field"><label>Partners Present at Meeting <span class="req">*</span>
      <span class="hint">Combined share of present partners must exceed 50%</span></label>
      <div id="present-partners">
        ${partners.map(pp=>`
          <label class="present-partner-item">
            <input type="checkbox" value="${pp.id}" ${presentIds.includes(String(pp.id))?'checked':''} onchange="updatePresentShare()">
            <span class="pname">${pp.name||'(unnamed)'} ${pp.isAuth?'<span class="auth-badge">AS</span>':''}</span>
            <span class="pshare">${pp.share}%</span>
          </label>`).join('')}
      </div>
    </div>
    <div id="present-share-info" class="share-total bad">Present share: 0% (must be > 50%)</div>
    <div class="nav-buttons">
      <button class="btn btn-secondary" onclick="renderStep(currentStep-1)">← Back</button>
      <button class="btn btn-primary" onclick="saveResolution()">Next →</button>
    </div>
  </div>`;
}
function bindResolution(){ updatePresentShare(); }
function updatePresentShare(){
  const partners=fd().partners||[];
  const checked=[...document.querySelectorAll('#present-partners input:checked')].map(e=>e.value);
  const total=partners.filter(p=>checked.includes(String(p.id))).reduce((s,p)=>s+(parseFloat(p.share)||0),0);
  const el=document.getElementById('present-share-info'); if(!el) return;
  const ok=total>50;
  el.className='share-total '+(ok?'ok':'bad');
  el.textContent=`Present combined share: ${total.toFixed(2)}% ${ok?'✓ (> 50%)':'(must exceed 50%)'}`;
}
function saveResolution(){
  const date=val('res-date'), time=val('res-time');
  if(!date){ fieldErr('res-date','Required'); return; }
  if(!time){ fieldErr('res-time','Required'); return; }
  const presentIds=[...document.querySelectorAll('#present-partners input:checked')].map(e=>e.value);
  if(!presentIds.length){ alert('Select at least one partner present.'); return; }
  const partners=fd().partners||[];
  const total=partners.filter(p=>presentIds.includes(String(p.id))).reduce((s,p)=>s+(parseFloat(p.share)||0),0);
  if(total<=50){ alert(`Present share is ${total.toFixed(2)}%. Must be > 50%.`); return; }
  const authPartner=partners.find(p=>p.isAuth);
  if(authPartner&&!presentIds.includes(String(authPartner.id))){
    if(!confirm(`The Authorised Signatory (${authPartner.name}) is not selected as present. Continue anyway?`)) return;
  }
  setfd('resolution', {date, time, presentIds});

          <input type="date" id="ddob-${dir.id}" value="${dir.dob}" onchange="updateDirectorField('${dir.id}','dob',this.value)"/>

      </div>
      <div class="field"><label>PAN Number <span class="req">*</span></label>
        <input id="dpan-${dir.id}" maxlength="10" style="text-transform:uppercase" value="${dir.pan}" placeholder="ABCDE1234F"

      <div class="field"><label>Address Proof (OVD) <span class="req">*</span></label>
        <div class="radio-group">

          <label><input type="radio" name="dovd-${dir.id}" value="Driving License" ${dir.ovdType==='Driving License'?'checked':''} onchange="setDirOVDType('${dir.id}','Driving License')"> Driving License</label>
          <label><input type="radio" name="dovd-${dir.id}" value="Voter ID" ${dir.ovdType==='Voter ID'?'checked':''} onchange="setDirOVDType('${dir.id}','Voter ID')"> Voter ID</label>
        </div></div>
      <div id="d-aadhaar-${dir.id}" style="${dir.ovdType==='Aadhaar'?'':'display:none'}">
        <div class="field"><label>Aadhaar (Last 4 digits) <span class="req">*</span></label>
          <div class="aadhaar-input"><span class="aadhaar-prefix">XXXX XXXX</span>
            <input id="daadh-${dir.id}" maxlength="4" placeholder="1234" value="${dir.aadhaarLast4}"
              oninput="updateDirectorField('${dir.id}','aadhaarLast4',this.value.replace(/\D/g,''))" style="flex:1"/>
          </div></div>
      </div>
      <div id="d-ovdnum-${dir.id}" style="${dir.ovdType!=='Aadhaar'?'':'display:none'}">
        <div class="field"><label>OVD Number <span class="req">*</span></label>
          <input id="dovdnum-${dir.id}" value="${dir.ovdNumber||''}" placeholder="Document number"
            oninput="updateDirectorField('${dir.id}','ovdNumber',this.value)"/></div>
      </div>

        <div class="field"><label>Nationality</label>
          <input id="dnat-${dir.id}" value="${dir.nationality||'Indian'}" oninput="updateDirectorField('${dir.id}','nationality',this.value)"/></div>
        <div class="field"><label>% Ownership / Interest <span class="req">*</span></label>
          <input id="dshare-${dir.id}" type="number" min="0" max="100" step="0.01" placeholder="e.g. 30" value="${dir.share}"
            oninput="updateDirectorField('${dir.id}','share',this.value)"/></div>
      </div>
    </div>`).join('');
}
function updateDirectorField(id,field,value){ const d=directorList.find(d=>String(d.id)===String(id)); if(d) d[field]=value; }
function setDirOVDType(id,type){
  updateDirectorField(id,'ovdType',type);
  document.getElementById(`d-aadhaar-${id}`).style.display=type==='Aadhaar'?'':'none';
  document.getElementById(`d-ovdnum-${id}`).style.display=type!=='Aadhaar'?'':'none';
}
function addDirector(){ directorList.push(newDirector()); renderDirectorCards(); }
function removeDirector(id){ if(directorList.length<=1) return; directorList=directorList.filter(d=>String(d.id)!==String(id)); renderDirectorCards(); }
function saveDirectors(){
  directorList.forEach(dir=>{
    const n=document.getElementById(`dn-${dir.id}`); if(n) dir.name=n.value.trim();
    const a=document.getElementById(`da-${dir.id}`); if(a) dir.address=a.value.trim();
    const sh=document.getElementById(`dshare-${dir.id}`); if(sh) dir.share=sh.value;
  });
  for(const dir of directorList){
    if(!dir.name){ alert('Name missing for a director/BO'); return; }
    if(!dir.address){ alert(`Address missing for ${dir.name}`); return; }
    if(!dir.dob){ alert(`DOB missing for ${dir.name}`); return; }
    if(!validatePAN(dir.pan)){ alert(`Invalid PAN for ${dir.name}`); return; }
    if(dir.ovdType==='Aadhaar'&&dir.aadhaarLast4.length!==4){ alert(`Enter 4-digit Aadhaar suffix for ${dir.name}`); return; }
    if(dir.ovdType!=='Aadhaar'&&!dir.ovdNumber){ alert(`OVD number missing for ${dir.name}`); return; }
  }
  setfd('directors', directorList);
  renderStep(currentStep+1);
}

// ─── Review & Download ─────────────────────────────────────────────────────
function rrow(label, value){
  if(!value && value !== 0) return '';
  return `<div class="review-row"><div class="rl">${label}</div><div class="rv">${value}</div></div>`;
}
function renderReview(){
  const data = fd();
  const b=data.business||{}, as_=data.as||{}, lh=data.lh||{};
  const partners=data.partners||[], res=data.resolution||{}, bo=data.boDeclaration||{};
  const directors=data.directors||[], cbo=data.companyBO||{};

  const docsHtml = merchantType==='proprietor' ? `
    <div class="download-card">
      <div class="doc-name">📄 Merchant Declaration Form (MDF)</div>
      <div class="doc-desc">Signatory declaration for ${b.name||''}</div>

    </div>
    <div class="download-card">
      <div class="doc-name">📄 Partnership BO Declaration</div>
      <div class="doc-desc">Beneficial Ownership declaration for ${b.name||''}</div>
      <button class="btn btn-success" onclick="downloadDoc('partnership-bo')">⬇ Download BO Declaration</button>
      <span id="dl-partnership-bo-status" style="font-size:11px;color:var(--muted);margin-left:8px"></span>
    </div>` : `
    <div class="download-card">
      <div class="doc-name">📄 Company BO Declaration</div>
      <div class="doc-desc">Beneficial Ownership declaration for ${b.name||''}</div>
      <button class="btn btn-success" onclick="downloadDoc('company-bo')">⬇ Download BO Declaration</button>
      <span id="dl-company-bo-status" style="font-size:11px;color:var(--muted);margin-left:8px"></span>

      ${rrow('Designation', as_.designation)}

      ${rrow('Address', lh.address)}

      <button class="btn btn-danger" onclick="confirmClearAll()">🗑 Clear All & Start Fresh</button>
    </div>
  </div>`;
}

async function downloadDoc(type){
  const statusEl=document.getElementById(`dl-${type}-status`);
  if(statusEl) statusEl.innerHTML='<span class="loading"><span class="spinner"></span> Generating...</span>';
  const data=fd();
  const payload={business:data.business,as:data.as,partners:data.partners,resolution:data.resolution,
    boDeclaration:data.boDeclaration,directors:data.directors,companyBO:data.companyBO,lh:data.lh};
  try{
    const res=await fetch(`/api/generate/${type}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error||'Server error'); }
    const blob=await res.blob();
    const cd=res.headers.get('Content-Disposition')||'';
    const filename=cd.match(/filename="(.+?)"/)?.[1]||`document_${type}.docx`;
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },2000);
    if(statusEl) statusEl.textContent='✓ Downloaded!';
    logUsage(type);
  } catch(e){
    if(statusEl) statusEl.textContent='✗ Error: '+e.message;
    alert('Download failed: '+e.message);
  }
}

async function logUsage(docType){
  const url=agent?.sheetsUrl||SHEETS_URL; if(!url) return;
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({merchantName:fd().business?.name||'',merchantType,docType,
        agentName:agent?.name||'',agentPhone:agent?.phone||'',cm:agent?.cm||'',
        state:agent?.state||'',timestamp:new Date().toISOString()})});
  } catch{}
}

init();
</script>
